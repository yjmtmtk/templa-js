      tagline="A tiny HTML template loader for static sites."></template>

    <article class="prose">
      <p>
        templa gives you the reusability of partials and layouts, the brevity
        of Handlebars-style placeholders, and the slot model of Web Components
        — all in a single ~3&nbsp;KB script with no dependencies.
      </p>
      <p>
        It runs in the browser for fast iteration, and ships a build CLI for
        production deploys where SEO and first-paint matter. The same source
        files work in both modes; you don't rewrite anything to switch.
      </p>
      <p>
        For interactivity, pair templa with
        <a href="https://alpinejs.dev/" target="_blank" rel="noopener">Alpine.js</a>.
        Both are HTML-first and require no build step of their own.
      </p>
    </article>
  </template>
